<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Product Strategy</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0e1a;
      color: #f9fafb;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .fc-header {
      padding: 28px 40px 20px;
      border-bottom: 1px solid #1f2937;
      background: #111827;
      display: flex;
      align-items: flex-start;
      gap: 16px;
    }
    .fc-badge {
      background: #be185d;
      border: 1px solid #f472b6;
      color: #fce7f3;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 4px 10px;
      border-radius: 20px;
      white-space: nowrap;
      margin-top: 4px;
    }
    .fc-title { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
    .fc-subtitle { color: #9ca3af; font-size: 14px; margin-top: 4px; }

    /* ── Toolbar ── */
    .fc-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 40px;
      background: #111827;
      border-bottom: 1px solid #1f2937;
    }
    .fc-btn {
      background: transparent;
      border: 1px solid #1f2937;
      color: #9ca3af;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .fc-btn:hover { background: #1f2937; color: #f9fafb; }
    .fc-separator { width: 1px; height: 24px; background: #1f2937; margin: 0 4px; }
    .fc-legend { margin-left: auto; display: flex; align-items: center; flex-wrap: wrap; }

    /* ── Canvas ── */
    .fc-canvas {
      flex: 1;
      overflow: auto;
      position: relative;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }
    #fc-svg {
      cursor: grab;
      user-select: none;
      transition: filter 0.2s;
      border-radius: 12px;
      max-width: 100%;
      height: auto;
    }
    #fc-svg:active { cursor: grabbing; }

    /* ── Node hover ── */
    .fc-node { transition: opacity 0.15s; }
    .fc-node:hover { opacity: 0.85; filter: brightness(1.15); }

    /* ── Tooltip ── */
    #fc-tooltip {
      position: fixed;
      background: #111827;
      border: 1px solid #1f2937;
      color: #f9fafb;
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 12px;
      pointer-events: none;
      display: none;
      z-index: 9999;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    /* ── Footer ── */
    .fc-footer {
      padding: 10px 40px;
      border-top: 1px solid #1f2937;
      background: #111827;
      font-size: 12px;
      color: #9ca3af;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* ── Export animation ── */
    @keyframes fc-flash {
      0%,100% { filter: none; }
      50%      { filter: brightness(1.6); }
    }
    .fc-exporting { animation: fc-flash 0.4s ease; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #0a0e1a; }
    ::-webkit-scrollbar-thumb { background: #1f2937; border-radius: 4px; }
  </style>
</head>

<script>
(function() {
  const svg = document.getElementById("fc-svg");
  const tooltip = document.getElementById("fc-tooltip");
  let scale = 1;

  const nodeData = {"core":{"id":"core","label":"Product Vision","type":"terminal"},"ux":{"id":"ux","label":"UX","type":"process"},"eng":{"id":"eng","label":"Engineering","type":"process"},"growth":{"id":"growth","label":"Growth","type":"process"},"ds":{"id":"ds","label":"Design System","type":"default"},"ur":{"id":"ur","label":"User Research","type":"default"},"infra":{"id":"infra","label":"Infrastructure","type":"default"},"api":{"id":"api","label":"APIs","type":"default"},"seo":{"id":"seo","label":"SEO","type":"default"},"ads":{"id":"ads","label":"Paid Ads","type":"default"}};

  // ── Zoom ──
  function applyScale() {
    svg.style.transform = "scale(" + scale + ")";
    svg.style.transformOrigin = "top center";
  }
  window.zoomIn  = () => { scale = Math.min(scale + 0.15, 3); applyScale(); };
  window.zoomOut = () => { scale = Math.max(scale - 0.15, 0.3); applyScale(); };
  window.resetZoom = () => { scale = 1; applyScale(); };

  svg.addEventListener("wheel", (e) => {
    e.preventDefault();
    e.deltaY < 0 ? zoomIn() : zoomOut();
  }, { passive: false });

  // ── Tooltips ──
  document.querySelectorAll(".fc-node").forEach(el => {
    el.addEventListener("mouseenter", (e) => {
      const id = el.dataset.id;
      const n = nodeData[id];
      if (!n) return;
      tooltip.style.display = "block";
      tooltip.innerHTML = "<strong>" + (n.label || id) + "</strong><br><span style='opacity:0.7'>" + (n.type || "node") + (n.description ? " · " + n.description : "") + "</span>";
    });
    el.addEventListener("mousemove", (e) => {
      tooltip.style.left = (e.clientX + 14) + "px";
      tooltip.style.top  = (e.clientY + 14) + "px";
    });
    el.addEventListener("mouseleave", () => { tooltip.style.display = "none"; });
  });

  // ── Export SVG ──
  window.exportSVG = () => {
    svg.classList.add("fc-exporting");
    setTimeout(() => svg.classList.remove("fc-exporting"), 400);
    const src = svg.outerHTML;
    const blob = new Blob([src], { type: "image/svg+xml" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "product_strategy.svg";
    a.click();
  };

  // ── Export PNG ──
  window.exportPNG = () => {
    svg.classList.add("fc-exporting");
    const src = new XMLSerializer().serializeToString(svg);
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement("canvas");
      canvas.width = svg.viewBox.baseVal.width;
      canvas.height = svg.viewBox.baseVal.height;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0);
      const a = document.createElement("a");
      a.href = canvas.toDataURL("image/png");
      a.download = "product_strategy.png";
      a.click();
      svg.classList.remove("fc-exporting");
    };
    img.src = "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(src)));
  };
})();
</script>
