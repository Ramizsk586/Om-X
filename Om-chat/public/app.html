<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="dark" />
    <title>Om-X Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/style.css" />
    <script src="/client-config.js"></script>
    <script src="/js/device.js"></script>
    <script src="/socket.io/socket.io.js"></script>
  </head>
  <body>
    <div id="app-shell" class="app-shell">
      <nav class="server-rail" aria-label="Servers">
        <div class="server-rail-top">
          <button id="server-rail-home" class="server-rail-home" type="button" aria-label="Hide channel sidebar" aria-pressed="false" title="Hide channel sidebar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="3.5" y="5" width="17" height="14" rx="2.5"></rect>
              <path d="M9 5v14"></path>
            </svg>
          </button>
          <hr class="server-rail-separator" />
          <div id="server-rail-list" class="server-rail-list"></div>
        </div>
        <div class="server-rail-bottom">
          <button id="server-rail-add" class="server-rail-utility is-add" type="button" aria-label="Add Server">
            <span aria-hidden="true">+</span>
          </button>
          <button id="server-rail-explore" class="server-rail-utility" type="button" aria-label="Explore Servers">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="12" r="8"></circle>
              <path d="m16.2 7.8-2.2 6.4-6.4 2.2 2.2-6.4z"></path>
            </svg>
          </button>
        </div>
      </nav>

      <aside class="channel-sidebar">
        <header class="server-head">
          <button id="server-title" class="server-title" type="button" aria-haspopup="menu" aria-expanded="false">
            <span class="server-title-copy">
              <span id="server-icon" class="server-title-icon">OX</span>
              <span id="server-name">Server</span>
            </span>
            <span class="caret" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M6 9l6 6 6-6" />
              </svg>
            </span>
          </button>
          <div id="server-menu" class="menu-popover hidden" role="menu"></div>
        </header>

        <div class="sidebar-scroll">
          <section id="dm-section" class="dm-section">
            <div class="channel-category channel-category-static">
              <span class="channel-category-label">Direct Messages</span>
              <span id="dm-section-badge" class="section-badge hidden">0</span>
            </div>
            <div id="dm-list" class="dm-list"></div>
          </section>

          <nav id="channel-nav" class="channel-nav" aria-label="Server channels"></nav>
        </div>

        <footer class="user-pane">
          <div id="self-user" class="user-panel">
            <div class="user-panel-avatar" id="self-avatar-trigger" role="button" tabindex="0" title="Change profile image" aria-label="Change profile image">
              <img class="avatar-image hidden" alt="" />
              <span class="avatar-letter">O</span>
              <span class="status-badge offline"></span>
            </div>
            <div class="user-panel-info">
              <span class="user-panel-name">Loading...</span>
              <span class="user-panel-tag">#0000</span>
            </div>
            <div class="user-panel-controls">
              <button id="status-btn" class="icon-btn status-btn user-panel-control" type="button" title="Status" aria-label="Status">
                <span class="status-btn-indicator"></span>
              </button>
              <button id="settings-btn" class="icon-btn user-panel-control" type="button" title="Server info" aria-label="Server info">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="3"></circle>
                  <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h.01a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h.01a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v.01a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                </svg>
              </button>
            </div>
          </div>
          <div id="status-popover" class="status-popover hidden"></div>
          <input id="avatar-input" type="file" accept="image/*" hidden />
        </footer>
      </aside>

      <main class="chat-pane">
        <header class="chat-header">
          <button id="mobile-nav-toggle" class="icon-btn mobile-nav-toggle" type="button" aria-label="Open navigation drawer" aria-expanded="false">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M4 7h16"></path>
              <path d="M4 12h16"></path>
              <path d="M4 17h10"></path>
            </svg>
          </button>
          <div class="chat-header-copy">
            <h2 id="active-channel-name"># general</h2>
            <p id="active-channel-topic">No topic</p>
          </div>
          <div class="chat-toolbar">
            <button id="search-toggle" class="icon-btn" type="button" aria-label="Search messages">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="7"></circle>
                <path d="m21 21-4.35-4.35"></path>
              </svg>
            </button>
            <button id="pin-toggle" class="icon-btn" type="button" aria-label="Pinned messages" aria-pressed="false">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 17v5"></path>
                <path d="M8 3h8l-1 7 3 3H6l3-3-1-7z"></path>
              </svg>
            </button>
            <button id="member-toggle" class="icon-btn" type="button" aria-label="Toggle members list">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                <circle cx="9" cy="7" r="4"></circle>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
              </svg>
            </button>
          </div>
        </header>

        <div id="search-panel" class="search-panel hidden">
          <input id="message-search" placeholder="Search messages" />
        </div>

        <div id="pinned-panel" class="pinned-panel hidden"></div>

        <div id="pinned-banner" class="pinned-banner hidden">
          <strong>Pinned</strong>
          <span id="pinned-text"></span>
          <button id="pin-dismiss" class="icon-btn" type="button" aria-label="Dismiss pinned banner">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 6 6 18"></path>
              <path d="m6 6 12 12"></path>
            </svg>
          </button>
        </div>

        <div id="message-list" class="message-list"></div>
        <div id="typing-indicator" class="typing-indicator"></div>
        <button id="jump-to-latest" class="jump-to-latest hidden" type="button">Jump to latest</button>

        <div id="announcement-notice" class="announcement-notice hidden">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="16" height="16" aria-hidden="true">
            <path d="M4 11V8a2 2 0 0 1 2-2h2l7-3v18l-7-3H6a2 2 0 0 1-2-2v-3" />
            <path d="M16 8a4 4 0 0 1 0 8" />
          </svg>
          <span>Only admins can post in announcement channels</span>
        </div>

        <div id="composer" class="composer">
          <div id="reply-preview" class="reply-preview hidden"></div>
          <div class="composer-row">
            <div id="pending-attachments" class="pending-attachments hidden" aria-live="polite"></div>
            <div class="composer-actions composer-actions-left">
              <label class="icon-btn composer-icon" for="file-input" aria-label="Attach file">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <path d="m21.44 11.05-8.84 8.84a5.5 5.5 0 1 1-7.78-7.78l8.49-8.48a3.5 3.5 0 0 1 4.95 4.95l-8.49 8.48a1.5 1.5 0 0 1-2.12-2.12l7.78-7.78"></path>
                </svg>
              </label>
              <input id="file-input" type="file" multiple hidden />
              <button type="button" id="gift-btn" class="icon-btn composer-icon" aria-label="GIF picker">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M20 12v8H4v-8"></path>
                  <path d="M2 7h20v5H2z"></path>
                  <path d="M12 22V7"></path>
                  <path d="M12 7H7.5a2.5 2.5 0 1 1 0-5C11 2 12 7 12 7z"></path>
                  <path d="M12 7h4.5a2.5 2.5 0 1 0 0-5C13 2 12 7 12 7z"></path>
                </svg>
              </button>
            </div>

            <textarea id="message-input" placeholder="Message #channel" rows="1"></textarea>

            <div class="composer-actions composer-actions-right">
              <button type="button" id="emoji-btn" class="icon-btn composer-icon" aria-label="Emoji picker">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="10"></circle>
                  <path d="M8 15s1.5 2 4 2 4-2 4-2"></path>
                  <path d="M9 9h.01"></path>
                  <path d="M15 9h.01"></path>
                </svg>
              </button>
              <button type="button" id="voice-btn" class="icon-btn composer-icon" aria-label="Hold to record voice message">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                  <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                  <path d="M12 19v4"></path>
                  <path d="M8 23h8"></path>
                </svg>
              </button>
            </div>
          </div>

          <div id="emoji-picker" class="floating-panel emoji-picker hidden"></div>
          <div id="gif-picker" class="floating-panel gif-picker hidden"></div>
          <div id="voice-tooltip" class="composer-tooltip hidden"></div>
        </div>
      </main>

      <aside class="members-sidebar" id="members-sidebar">
        <header><span id="members-sidebar-title">Members</span> <span id="member-online-count">0</span></header>
        <div id="members-list"></div>
      </aside>
    </div>

    <button id="mobile-drawer-backdrop" class="mobile-drawer-backdrop hidden" type="button" aria-label="Close mobile panels"></button>

    <div id="member-popout" class="member-popout hidden"></div>

    <div id="delete-confirm-popover" class="popover-panel hidden">
      <div class="popover-title">Delete message?</div>
      <div class="popover-actions">
        <button id="delete-confirm-cancel" type="button" class="btn-secondary">Cancel</button>
        <button id="delete-confirm-submit" type="button" class="btn-danger">Delete</button>
      </div>
    </div>

    <div id="server-info-modal" class="modal hidden">
      <div class="modal-inner server-info-modal-inner">
        <div class="modal-head">
          <strong id="server-info-title">Server Info</strong>
          <button id="server-info-close" type="button" class="icon-btn" aria-label="Close server info">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 6 6 18"></path>
              <path d="m6 6 12 12"></path>
            </svg>
          </button>
        </div>
        <div class="server-info-row">
          <span class="section-label">Server Name</span>
          <div id="server-info-name" class="server-info-value">-</div>
        </div>
        <div class="server-info-row">
          <span class="section-label">Server ID</span>
          <div id="server-info-id" class="server-info-value">-</div>
        </div>
        <div class="server-info-row">
          <span id="server-info-link-label" class="section-label">Invite Link</span>
          <div id="server-info-link" class="server-info-value server-info-link-value">-</div>
        </div>
        <div class="modal-stack-actions">
          <button id="copy-server-id-btn" type="button" class="btn-secondary">Copy Server ID</button>
          <button id="copy-server-link-btn" type="button" class="btn-primary">Copy Link</button>
        </div>
      </div>
    </div>


    <div id="chat-cleanup-modal" class="modal hidden">
      <div class="modal-inner chat-cleanup-modal-inner">
        <div class="modal-head">
          <strong>Chat Cleanup</strong>
          <button id="chat-cleanup-close" type="button" class="icon-btn" aria-label="Close chat cleanup">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 6 6 18"></path>
              <path d="m6 6 12 12"></path>
            </svg>
          </button>
        </div>
        <p class="modal-description">Use the time boxes for timeline clear. Leave both empty to clear everything.</p>
        <div class="chat-cleanup-time-grid">
          <label class="chat-cleanup-field">
            <span class="section-label">From Time</span>
            <input id="cleanup-from-input" class="modal-input" type="datetime-local" />
          </label>
          <label class="chat-cleanup-field">
            <span class="section-label">To Time</span>
            <input id="cleanup-to-input" class="modal-input" type="datetime-local" />
          </label>
        </div>
        <div id="chat-cleanup-error" class="chat-cleanup-error hidden"></div>
        <div class="modal-stack-actions">
          <button id="cleanup-channel-btn" type="button" class="btn-secondary">Clear Chat</button>
          <button id="cleanup-server-btn" type="button" class="btn-danger">Clear All Chat</button>
        </div>
      </div>
    </div>
    <div id="action-modal" class="modal hidden">
      <div class="modal-inner action-modal-inner">
        <div class="modal-head">
          <strong id="action-modal-title">Update</strong>
          <button id="action-modal-close" type="button" class="icon-btn" aria-label="Close dialog">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 6 6 18"></path>
              <path d="m6 6 12 12"></path>
            </svg>
          </button>
        </div>
        <p id="action-modal-description" class="modal-description"></p>
        <input id="action-modal-input" class="modal-input" maxlength="80" />
        <div class="modal-actions">
          <button id="action-modal-secondary" type="button" class="btn-secondary">Cancel</button>
          <button id="action-modal-primary" type="button" class="btn-primary">Save</button>
        </div>
      </div>
    </div>

    <div id="channel-switcher" class="modal hidden">
      <div class="modal-inner switcher-inner">
        <input id="channel-switch-input" placeholder="Jump to a channel or DM" />
        <div id="channel-switch-list" class="switcher-list"></div>
      </div>
    </div>

    <script src="/js/app.js" type="module"></script>
  </body>
</html>
