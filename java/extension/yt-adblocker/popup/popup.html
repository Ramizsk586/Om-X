<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YT Ad Blocker Pro</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="header">
      <h1>YT Ad Blocker Pro</h1>
      <span id="status-dot" class="status-dot active"></span>
    </header>

    <section class="toggle-section">
      <span class="toggle-label">Protection</span>
      <label class="switch" for="toggle-switch">
        <input type="checkbox" id="toggle-switch" />
        <span class="slider"></span>
      </label>
      <span id="status-text" class="toggle-state">Active</span>
    </section>

    <section class="stats-grid">
      <article class="stat-card">
        <div id="blocked-count" class="stat-value">0</div>
        <div class="stat-label">Ads Blocked</div>
      </article>
      <article class="stat-card">
        <div id="skipped-count" class="stat-value">0</div>
        <div class="stat-label">Ads Skipped</div>
      </article>
    </section>

    <section class="options-section">
      <label class="option-row" for="strict-mode-toggle">
        <span>Strict mode</span>
        <input type="checkbox" id="strict-mode-toggle" />
      </label>
      <label class="option-row" for="debug-toggle">
        <span>Debug logs</span>
        <input type="checkbox" id="debug-toggle" />
      </label>
    </section>

    <button id="reset-btn" type="button">Reset Stats</button>

    <footer id="footer-text">Running on YouTube</footer>

    <script src="popup.js"></script>
  </body>
</html>
