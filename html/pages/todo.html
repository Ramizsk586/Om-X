<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Omni To-Do Station</title>
  <link rel="stylesheet" href="../../css/base/reset.css">
  <link rel="stylesheet" href="../../css/base/variables.css">
  <link rel="stylesheet" href="../../css/base/base.css">
  <link rel="stylesheet" href="../../css/themes/all-themes.css">
  <style>
    :root {
      --bg-dark: #111111;
      --bg-panel: #181818;
      --bg-card: #202020;
      --bg-card-strong: #292929;
      --bg-hover: #2f2f2f;
      --text: #f5f5f5;
      --text-dim: #a3a3a3;
      --text-muted: #737373;
      --border: rgba(255, 255, 255, 0.08);
      --success: #a3e635;
      --danger: #f87171;
      --warning: #fbbf24;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.04), transparent 28%),
        linear-gradient(180deg, #151515 0%, #101010 100%);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 18px 28px 28px;
      background: rgba(19, 19, 19, 0.96);
    }

    .input-section {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-shrink: 0;
    }

    .input-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 18px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      transition: border-color 0.2s, background 0.2s;
    }

    .input-wrapper:focus-within {
      background: var(--bg-card-strong);
      border-color: rgba(255, 255, 255, 0.16);
    }

    .input-wrapper svg {
      color: var(--text-dim);
      flex-shrink: 0;
    }

    .input-wrapper input {
      flex: 1;
      height: 58px;
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 15px;
      outline: none;
    }

    .input-wrapper input::placeholder {
      color: var(--text-muted);
    }

    .btn-add {
      width: 58px;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-card-strong);
      border: 1px solid var(--border);
      border-radius: 16px;
      cursor: pointer;
      transition: transform 0.2s, background 0.2s;
      flex-shrink: 0;
    }

    .btn-add:hover {
      background: #353535;
      transform: translateY(-1px);
    }

    .btn-add svg {
      color: var(--text);
    }

    .filter-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 18px;
      flex-shrink: 0;
    }

    .filter-tab {
      padding: 10px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--text-dim);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }

    .filter-tab:hover {
      background: var(--bg-hover);
      color: var(--text);
    }

    .filter-tab.active {
      background: #343434;
      border-color: rgba(255, 255, 255, 0.14);
      color: var(--text);
    }

    .todo-list-container {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .todo-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding-right: 8px;
    }

    .todo-list::-webkit-scrollbar {
      width: 8px;
    }

    .todo-list::-webkit-scrollbar-track {
      background: transparent;
    }

    .todo-list::-webkit-scrollbar-thumb {
      background: rgba(120, 120, 120, 0.85);
      border-radius: 999px;
    }

    .todo-list::-webkit-scrollbar-thumb:hover {
      background: rgba(160, 160, 160, 0.95);
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 18px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      transition: background 0.2s, border-color 0.2s, opacity 0.2s;
    }

    .todo-item:hover {
      background: var(--bg-hover);
      border-color: rgba(255, 255, 255, 0.14);
    }

    .todo-item.completed {
      opacity: 0.72;
    }

    .todo-item.completed .todo-text {
      text-decoration: line-through;
      color: var(--text-dim);
    }

    .check-btn {
      width: 24px;
      height: 24px;
      border: 2px solid var(--border);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: border-color 0.2s, background 0.2s;
    }

    .check-btn:hover {
      border-color: rgba(255, 255, 255, 0.2);
    }

    .todo-item.completed .check-btn {
      background: var(--success);
      border-color: var(--success);
    }

    .check-btn svg {
      color: #111111;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .todo-item.completed .check-btn svg {
      opacity: 1;
    }

    .todo-text {
      flex: 1;
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      word-break: break-word;
    }

    .todo-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .todo-time {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.03em;
    }

    .btn-delete {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      color: var(--text-muted);
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      border: none;
      background: transparent;
    }

    .btn-delete:hover {
      background: rgba(248, 113, 113, 0.12);
      color: var(--danger);
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 72px 20px;
      text-align: center;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.015), rgba(255, 255, 255, 0));
      border: 1px dashed rgba(255, 255, 255, 0.08);
      border-radius: 18px;
    }

    .empty-state svg {
      color: #4b5563;
      margin-bottom: 16px;
    }

    .empty-state h3 {
      font-size: 16px;
      color: var(--text);
      margin-bottom: 8px;
    }

    .empty-state p {
      font-size: 13px;
      color: var(--text-dim);
    }

    .footer {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding: 18px 0 0 0;
      border-top: 1px solid var(--border);
      margin-top: 16px;
      flex-shrink: 0;
    }

    .btn-clear {
      padding: 10px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text-dim);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }

    .btn-clear:hover {
      background: #2a1d1d;
      border-color: rgba(248, 113, 113, 0.3);
      color: #fca5a5;
    }

    .priority-high {
      border-left: 3px solid var(--danger);
    }

    .priority-medium {
      border-left: 3px solid var(--warning);
    }

    .priority-low {
      border-left: 3px solid var(--success);
    }

    .priority-badge {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 999px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .priority-badge.high {
      background: rgba(248, 113, 113, 0.12);
      color: var(--danger);
    }

    .priority-badge.medium {
      background: rgba(251, 191, 36, 0.12);
      color: var(--warning);
    }

    .priority-badge.low {
      background: rgba(163, 230, 53, 0.12);
      color: var(--success);
    }

    @media (max-width: 760px) {
      .main {
        padding: 16px;
      }

      .input-section {
        flex-direction: column;
      }

      .btn-add {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <main class="main">
      <div class="input-section">
        <div class="input-wrapper">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          <input type="text" id="todo-input" placeholder="Add a new task...">
        </div>
        <button id="btn-add" class="btn-add" aria-label="Add task">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
        </button>
      </div>

      <div class="filter-tabs">
        <button class="filter-tab active" data-filter="all">All</button>
        <button class="filter-tab" data-filter="active">Active</button>
        <button class="filter-tab" data-filter="completed">Completed</button>
      </div>

      <div class="todo-list-container">
        <div id="todo-list" class="todo-list"></div>
      </div>

      <footer class="footer">
        <button id="btn-clear-completed" class="btn-clear">Clear Completed</button>
      </footer>
    </main>
  </div>

  <script type="module" src="../../java/renderer/todoRenderer.js"></script>
</body>
</html>
