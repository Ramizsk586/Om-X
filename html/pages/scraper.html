<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Om-X Scraper</title>
  <link rel="stylesheet" href="../../css/base/reset.css">
  <link rel="stylesheet" href="../../css/base/variables.css">
  <link rel="stylesheet" href="../../css/base/base.css">
  <link rel="stylesheet" href="../../css/pages/scraper.css">
</head>
<body>
  <div id="neural-scraper-panel" class="scraper-overlay">
    <div class="scraper-controls-wrapper" id="scraper-controls-wrapper">
      <div class="scraper-toolbar-row">
        <div class="scraper-mode-toggle">
          <button class="mode-btn active" data-mode="images">
            <svg style="display:inline-block; width:12px; height:12px; margin-right:6px; vertical-align:middle;" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 19V7c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2z"/></svg>
            Images
          </button>
          <button class="mode-btn" data-mode="videos">
            <svg style="display:inline-block; width:12px; height:12px; margin-right:6px; vertical-align:middle;" viewBox="0 0 24 24" fill="currentColor"><path d="M17 10.5V7c0 .55-.45 1-1 1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
            Videos
          </button>
          <button class="mode-btn" data-mode="data">
            <svg style="display:inline-block; width:12px; height:12px; margin-right:6px; vertical-align:middle;" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3C7 3 3 4.79 3 7v10c0 2.21 4 4 9 4s9-1.79 9-4V7c0-2.21-4-4-9-4zm0 2c4.42 0 7 .99 7 2s-2.58 2-7 2-7-.99-7-2 2.58-2 7-2zm0 14c-4.42 0-7-.99-7-2v-2.08C6.54 15.58 9.08 16 12 16s5.46-.42 7-1.08V17c0 1.01-2.58 2-7 2zm0-5c-4.42 0-7-.99-7-2V9.92C6.54 10.58 9.08 11 12 11s5.46-.42 7-1.08V12c0 1.01-2.58 2-7 2z"/></svg>
            Data
          </button>
          <button class="mode-btn" data-mode="ai-data">
            <svg style="display:inline-block; width:12px; height:12px; margin-right:6px; vertical-align:middle;" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a4 4 0 0 1 4 4v2.25a3 3 0 0 0 1.76 2.73l1.48.7a3 3 0 0 1 0 5.44l-1.48.7A3 3 0 0 0 16 19.75V22h-2v-2.25a3 3 0 0 0-1.76-2.73l-1.48-.7a3 3 0 0 1 0-5.44l1.48-.7A3 3 0 0 0 14 8.25V6a2 2 0 0 0-4 0v2.25a3 3 0 0 0-1.76 2.73l-1.48.7a3 3 0 0 1 0 5.44l1.48.7A3 3 0 0 0 10 19.75V22H8v-2.25a5 5 0 0 1-2.94-4.56 5 5 0 0 1 2.94-4.56V6a4 4 0 0 1 4-4z"/></svg>
            AI Data
          </button>
          <button id="btn-open-scraper-usage" class="btn-batch-action btn-toolbar-usage" type="button">USAGE</button>
        </div>
      </div>

      <div class="scraper-input-row" id="scraper-controls">
        <input type="text" id="scraper-query" placeholder="Enter search topic for assets..." autofocus>
        <button id="btn-start-scrape" class="btn-primary">DISCOVER</button>
      </div>
    </div>

    <div class="scraper-results-header hidden" id="scraper-results-toolbar">
      <div class="results-info" id="results-count-label">0 ASSETS DISCOVERED</div>
      <button id="btn-save-all-desktop" class="btn-batch-action" style="display:none;">SAVE ALL TO DESKTOP</button>
    </div>

    <div id="scraper-results" class="scraper-results"></div>
  </div>

  <div id="scraper-image-viewer" class="viewer-overlay hidden">
    <div class="viewer-content">
      <button id="btn-close-viewer" class="btn-close-viewer" type="button">x</button>
      <img id="viewer-img" src="" alt="Scraped Asset">
      <button id="btn-viewer-dl" class="btn-primary viewer-download" type="button">DOWNLOAD</button>
    </div>
  </div>


  <div id="scraper-usage-modal" class="modal-overlay hidden">
    <div class="modal modal-usage">
      <h2>Search API Usage</h2>
      <p>Live monthly quota details for the .env-configured SerpAPI, Tavily, and NewsAPI keys.</p>
      <div class="usage-toolbar">
        <div id="scraper-usage-status" class="usage-status">Ready</div>
        <button id="btn-refresh-scraper-usage" class="btn-batch-action" type="button">REFRESH</button>
      </div>
      <div class="usage-table-wrap">
        <table class="usage-table">
          <thead>
            <tr>
              <th>Provider</th>
              <th>Plan</th>
              <th>Monthly Limit</th>
              <th>Used</th>
              <th>Left</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="scraper-usage-tbody">
            <tr>
              <td colspan="6" class="usage-empty">No usage data loaded yet.</td>
            </tr>
          </tbody>
        </table>
      </div>
      <div id="scraper-usage-meta" class="usage-meta"></div>
      <div class="modal-actions">
        <button id="btn-close-scraper-usage" class="btn-primary" type="button">CLOSE</button>
      </div>
    </div>
  </div>

  <div id="ai-report-settings-modal" class="modal-overlay hidden">
    <div class="modal">
      <h2>AI Report Settings</h2>
      <p>Choose the context length and temperature for the AI synthesis report.</p>
      <label for="ai-report-context-length">Context Length</label>
      <input type="number" id="ai-report-context-length" placeholder="3000" min="512" max="8192" step="256">
      <label for="ai-report-temperature" style="margin-top:14px;">Temperature</label>
      <input type="number" id="ai-report-temperature" placeholder="0.3" min="0" max="1.5" step="0.1">
      <div class="modal-actions">
        <button id="btn-ai-report-cancel" class="btn-batch-action" type="button">CANCEL</button>
        <button id="btn-ai-report-apply" class="btn-primary" type="button">APPLY</button>
      </div>
    </div>
  </div>

  <script src="../../java/renderer/scraperRenderer.js"></script>
</body>
</html>
