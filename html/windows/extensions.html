<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: file: blob:;">
  <title>Extensions</title>
  <link rel="stylesheet" href="../../css/base/reset.css">
  <link rel="stylesheet" href="../../css/base/variables.css">
  <link rel="stylesheet" href="../../css/base/base.css">
  <link rel="stylesheet" href="../../css/themes/all-themes.css">
  <link rel="stylesheet" href="../../css/layout/system.css">
  <style>
    body {
      background: #09090b;
      color: #fafafa;
    }
    .ext-list {
      margin-top: 10px;
    }
    .ext-card {
      border-bottom: 1px solid #18181b;
      padding: 20px 0;
      display: grid;
      gap: 10px;
    }
    .ext-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .ext-head {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }
    .ext-icon-wrap {
      width: 34px;
      height: 34px;
      border-radius: 9px;
      border: 1px solid #27272a;
      background: #111114;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      overflow: hidden;
    }
    .ext-icon {
      width: 16px;
      height: 16px;
    }
    .ext-icon-fallback {
      font-size: 10px;
      font-weight: 700;
      color: #fff;
      background: #2563eb;
      border-radius: 5px;
      width: 16px;
      height: 16px;
      display: grid;
      place-items: center;
    }
    .ext-title {
      margin: 0;
      font-size: 17px;
      font-weight: 700;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .ext-version {
      margin: 2px 0 0;
      font-size: 12px;
      color: #a1a1aa;
    }
    .ext-status {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
      border: 1px solid #3f3f46;
      color: #d4d4d8;
      border-radius: 999px;
      padding: 4px 8px;
      margin-right: 8px;
    }
    .ext-status.enabled {
      border-color: rgba(34, 197, 94, 0.55);
      color: #86efac;
    }
    .ext-desc {
      margin: 0;
      font-size: 13px;
      color: #d4d4d8;
      line-height: 1.45;
    }
    .ext-path {
      margin: 0;
      font-size: 11px;
      color: #71717a;
      word-break: break-all;
    }
    .ext-error {
      margin: 0;
      font-size: 12px;
      color: #fca5a5;
    }
    .ext-empty {
      color: #71717a;
      font-size: 13px;
      padding: 10px 0;
    }
  </style>
</head>
<body>
  <div class="system-content-area">
    <div id="panel-extensions" class="settings-panel active">
      <div class="panel-header">
        <h2>Extensions</h2>
        <p>Manage installed extensions and built-in ad blocker modules.</p>
      </div>
      <div id="extensions-root" class="settings-section-card ext-list">
        <div class="ext-empty">Loading extensions...</div>
      </div>
    </div>
  </div>

  <script type="module" src="../../java/renderer/extensionsRenderer.js"></script>
</body>
</html>
